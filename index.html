<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <title>Головна сторінка</title>
    <link rel="shortcut icon" href="Images/favicon.svg" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="header">
        <img src="Images/icon.svg" alt="Icon">
        <a href="upload.html">+ Завантажити</a>
    </header>
    <section class="hero">
        <div class="hero__container">
            <h1 class="main__text" style="margin-top: 28px;">Малюй анонімно.</h1>
            <h1 class="yellow__text">Ділись сміливо.</h1>
            <p class="text__secondary" style="margin-top: 12px;">Ніяких аккаунтів. Тільки арт та вподобайки.</p>
            <a href="upload.html">Завантажити малюнок</a>
        </div>
    </section>
    <section class="stats">
        <div class="stats__container">
            <ul>
                <li>
                    <div class="alltimearts">
                        <h1 class="main__text" id="artsAllTimeCount" style="margin-top: 9px;">0</h1>
                        <p class="text__secondary">малюнків</p>
                    </div>
                </li>
                <li>
                    <div class="artstoday">
                        <h1 class="main__text" id="artsTodayCount" style="margin-top: 9px;">0</h1>
                        <p class="text__secondary">малюнків сьогодні</p>
                    </div>
                </li>
                <li>
                    <div class="likes">
                        <h1 class="main__text" id="allArtsLikes" style="margin-top: 9px;">0</h1>
                        <p class="text__secondary">вподобайок</p>
                    </div>
                </li>
            </ul>


            

            </div>
        </div>
    </section>
    <section class="modebtns">
        <ul style="margin-left: 5px;">
            <li>
                <h1 class="main__text">Свіже</h1>
            </li>
            <li>
                <button class="mode-btn" onclick="SetMode('newest')">Нові</button>
            </li>
            <li>
                <button class="mode-btn" onclick="SetMode('topToday')">Топ дня</button>
            </li>
            <li>
                <button class="mode-btn" onclick="SetMode('topWeek')">Топ тижня</button>                
            </li>
        </ul>
    </section>
    <div id="gallery" class="gallery-container"></div>
    <section class="endsite">
        <div class="endsite__container">
            <p class="text__secondary" style="margin-top: 12px;">anonart — анонімно · чесно · пікселями</p>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
